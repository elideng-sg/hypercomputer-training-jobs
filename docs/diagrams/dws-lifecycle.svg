<text text-anchor="start" x="1372.5" y="-173.2" font-family="Arial" font-weight="bold" font-size="11.00">The GPU node must ALWAYS have an occupying pod</text>
<text text-anchor="start" x="1278" y="-158.2" font-family="Arial" font-weight="bold" font-size="11.00">When vLLM or real workload is running:</text>
<text text-anchor="start" x="1488" y="-158.2" font-family="Arial" font-size="11.00"> Holder scaled to 0 replicas (workload holds the node)</text>
<text text-anchor="start" x="1278" y="-143.2" font-family="Arial" font-weight="bold" font-size="11.00">When no workload is running:</text>
<text text-anchor="start" x="1436" y="-143.2" font-family="Arial" font-size="11.00"> Holder IMMEDIATELY scaled to 1 replica (gap&#45;free handoff)</text>
<text text-anchor="start" x="1278" y="-128.2" font-family="Arial" font-weight="bold" font-size="11.00">Why:</text>
<text text-anchor="start" x="1278" y="-112.2" font-family="Arial" font-size="11.00">• H100 capacity is scarce &#45; took hours/days to obtain</text>
<text text-anchor="start" x="1278" y="-97.2" font-family="Arial" font-size="11.00">• Idle/unheld node &#45;&gt; autoscaler reclaims it &#45;&gt; you lose the GPUs</text>
<text text-anchor="start" x="1278" y="-82.2" font-family="Arial" font-size="11.00">• Cost is not a concern (you pay for 7&#45;day window regardless)</text>
</g>
