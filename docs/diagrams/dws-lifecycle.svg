<text text-anchor="start" x="804" y="-150.2" font-family="Arial" font-weight="bold" font-size="11.00" fill="#f57f17">Bugfix 0002 &#45; Reclaim After 10min</text>
<text text-anchor="start" x="552" y="-134.2" font-family="Arial" font-size="11.00" fill="#d84315">Problem: Node provisioned then deleted ~15 minutes later</text>
<text text-anchor="start" x="552" y="-120.2" font-family="Arial" font-weight="bold" font-size="11.00">Root cause:</text>
<text text-anchor="start" x="616" y="-120.2" font-family="Arial" font-size="11.00"> No pod consumed the ProvisioningRequest inside the 10&#45;min booking window</text>
<text text-anchor="start" x="552" y="-105.2" font-family="Arial" font-weight="bold" font-size="11.00">Fix:</text>
<text text-anchor="start" x="572" y="-105.2" font-family="Arial" font-size="11.00"> Deploy holder WITH consume&#45;* annotations BEFORE request submitted (holder waits Pending, binds immediately when node provisions)</text>
</g>
