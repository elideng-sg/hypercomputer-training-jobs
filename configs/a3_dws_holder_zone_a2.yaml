# ==============================================================================
# DWS consumer holder for the SECOND zone-a node (a3-h100-req-zone-a2)
# ==============================================================================
# Waits Pending until the second zone-a A3 node provisions, then binds it within
# the 10-min booking window (via the consume-provisioning-request annotation) and
# holds all 8 H100s (safe-to-evict:false) so the node is not reclaimed. Scale to 0
# to hand the node off to a real workload (e.g. a 2-node multi-node job).
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: a3-holder-zone-a2
  namespace: default
  labels: { app: a3-holder, dws-zone: us-central1-a }
spec:
  replicas: 1
  selector:
    matchLabels: { app: a3-holder-zone-a2 }
  template:
    metadata:
      labels: { app: a3-holder-zone-a2 }
      annotations:
        autoscaling.x-k8s.io/consume-provisioning-request: a3-h100-req-zone-a2
        autoscaling.x-k8s.io/provisioning-class-name: "queued-provisioning.gke.io"
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    spec:
      restartPolicy: Always
      nodeSelector:
        node.kubernetes.io/instance-type: a3-highgpu-8g
        gpu-cluster: a3-h100
        topology.kubernetes.io/zone: us-central1-a
      tolerations:
      - { key: "nvidia.com/gpu", operator: "Exists", effect: "NoSchedule" }
      - { key: "cloud.google.com/gke-queued", operator: "Exists", effect: "NoSchedule" }
      containers:
      - name: pause
        image: registry.k8s.io/pause:3.9
        resources:
          limits: { nvidia.com/gpu: "8", cpu: "64", memory: "384Gi" }
          requests: { nvidia.com/gpu: "8", cpu: "64", memory: "384Gi" }
