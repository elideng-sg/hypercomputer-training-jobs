# ==============================================================================
# GKE Dynamic Workload Scheduler (DWS) - Queued Provisioning Request (Zone B)
# ==============================================================================
# Requests 1x A3 8x H100 (`a3-highgpu-8g`) instance directly out of the physical
# Compute Engine DWS scheduling queue right across availability zone us-central1-b
# with maximum allowed non-preemptible running duration (`604800` seconds / 7 days).
# ==============================================================================
apiVersion: autoscaling.x-k8s.io/v1
kind: ProvisioningRequest
metadata:
  name: a3-h100-req-zone-b
  namespace: default
spec:
  provisioningClassName: queued-provisioning.gke.io
  parameters:
    maxRunDurationSeconds: "604800"  # Maximum allowable uninterrupted duration (`7 continuous days`)
  podSets:
  - count: 1
    podTemplateRef:
      name: a3-h100-pod-template-zone-b

---
apiVersion: v1
kind: PodTemplate
metadata:
  name: a3-h100-pod-template-zone-b
  namespace: default
template:
  metadata:
    labels:
      app: gpu-nccl-test
      dws-zone: us-central1-b
  spec:
    restartPolicy: Never
    nodeSelector:
      node.kubernetes.io/instance-type: a3-highgpu-8g
      gpu-cluster: a3-h100
    tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "cloud.google.com/gke-queued"
      operator: "Exists"
      effect: "NoSchedule"
    containers:
    - name: dws-placeholder-zone-b
      image: nvcr.io/nvidia/pytorch:24.03-py3
      resources:
        limits:
          nvidia.com/gpu: "8"
          cpu: "64"
          memory: "384Gi"
        requests:
          nvidia.com/gpu: "8"
          cpu: "64"
          memory: "384Gi"
