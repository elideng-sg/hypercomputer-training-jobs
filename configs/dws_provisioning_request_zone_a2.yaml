# ==============================================================================
# GKE DWS - Queued Provisioning Request (Zone A, SECOND node)
# ==============================================================================
# A second Flex-Start request hard-pinned to us-central1-a so that, when capacity
# appears, zone-a holds TWO a3-highgpu-8g (8x H100) nodes in the SAME zone —
# the minimum for multi-node (inter-node NCCL / GPUDirect) work, which requires
# nodes co-located in one zone. Queues immediately; fulfills whenever capacity
# frees (Flex-Start cannot be scheduled for a specific future time — that is
# calendar/reservation mode). Pairs with the a3-holder-zone-a2 consumer holder.
# ==============================================================================
apiVersion: autoscaling.x-k8s.io/v1
kind: ProvisioningRequest
metadata:
  name: a3-h100-req-zone-a2
  namespace: default
spec:
  provisioningClassName: queued-provisioning.gke.io
  parameters:
    maxRunDurationSeconds: "604800"  # 7 continuous days (Flex-Start max)
  podSets:
  - count: 1
    podTemplateRef:
      name: a3-h100-pod-template-zone-a2

---
apiVersion: v1
kind: PodTemplate
metadata:
  name: a3-h100-pod-template-zone-a2
  namespace: default
template:
  metadata:
    labels:
      app: gpu-nccl-test
      dws-zone: us-central1-a
  spec:
    restartPolicy: Never
    nodeSelector:
      node.kubernetes.io/instance-type: a3-highgpu-8g
      gpu-cluster: a3-h100
      topology.kubernetes.io/zone: us-central1-a   # hard-pin to zone-a (2nd node here)
    tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "cloud.google.com/gke-queued"
      operator: "Exists"
      effect: "NoSchedule"
    containers:
    - name: dws-placeholder-zone-a2
      image: nvcr.io/nvidia/pytorch:24.03-py3
      resources:
        limits:
          nvidia.com/gpu: "8"
          cpu: "64"
          memory: "384Gi"
        requests:
          nvidia.com/gpu: "8"
          cpu: "64"
          memory: "384Gi"
