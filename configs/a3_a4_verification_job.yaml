apiVersion: batch/v1
kind: Job
metadata:
  name: gcp-ai-hypercomputer-verification
  labels:
    job-group: ai-cluster-verify
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        job-group: ai-cluster-verify
        app: gpu-nccl-test
    spec:
      restartPolicy: Never
      nodeSelector:
        # Route job directly to high-capacity 8x L4 Ada Lovelace Option 2 Iowa hub (g2-standard-96)
        node.kubernetes.io/instance-type: g2-standard-96
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: verify-ddp-allreduce
        # Official NVIDIA PyTorch container equipped with Hopper optimizations & CUDA 12.x
        image: nvcr.io/nvidia/pytorch:24.03-py3
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          echo "================================================================="
          echo " -> Container online! Inspecting internal hardware attachments..."
          echo "================================================================="
          nvidia-smi
          
          echo ""
          echo "================================================================="
          echo " -> Initializing PyTorch Distributed 8x GPU Run with torchrun..."
          echo "================================================================="
          mkdir -p /workspace/src /workspace/logs
          # Copy benchmark code over from mounted ConfigMap or direct workspace path
          if [ -f "/mounted_src/train_benchmark_fp8.py" ]; then
            cp /mounted_src/train_benchmark_fp8.py /workspace/src/
          fi
          
          cd /workspace && \
          torchrun \
            --nproc_per_node=8 \
            --nnodes=1 \
            --master_addr="127.0.0.1" \
            --master_port=29500 \
            src/train_benchmark_fp8.py
            
          echo "[+] Job completed cleanly. Log dumps available under /workspace/logs."
        env:
        - name: NCCL_DEBUG
          value: "INFO"
        - name: NCCL_DEBUG_SUBSYS
          value: "INIT,ENV,NET"
        - name: NCCL_NET_GDR_LEVEL
          value: "5"
        - name: NCCL_ALGORITHM
          value: "RING"
        - name: OMP_NUM_THREADS
          value: "8"
        resources:
          limits:
            nvidia.com/gpu: "8"
            cpu: "64"
            memory: "300Gi"
          requests:
            nvidia.com/gpu: "8"
            cpu: "64"
            memory: "300Gi"
        volumeMounts:
        - name: shm
          mountPath: /dev/shm
        - name: benchmark-code
          mountPath: /mounted_src
      volumes:
      # Critical: Mount high-capacity in-memory IPC volume to prevent PyTorch zero-copy data crashes
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 64Gi
      - name: benchmark-code
        configMap:
          name: verification-source-map
