# ==============================================================================
# GKE Dynamic Workload Scheduler (DWS) - Queued Provisioning Request
# ==============================================================================
# When an A3/A4 AI Hypercomputer node pool is created with --enable-queued-provisioning,
# physical nodes are allocated dynamically from Compute Engine's Queued Provisioning
# queue to eliminate synchronous [GCE_STOCKOUT] hardware allocation failures.
#
# You can submit this ProvisioningRequest manifest directly ahead of high-scale
# distributed workloads or let GKE automatically handle queuing when a workload pod
# specifying `cloud.google.com/gke-queued: "true"` arrives.
# ==============================================================================
apiVersion: autoscaling.x-k8s.io/v1
kind: ProvisioningRequest
metadata:
  name: a3-h100-verification-req
  namespace: default
spec:
  provisioningClassName: queued-provisioning.gke.io
  parameters:
    maxRunDurationSeconds: 86400  # 24 hours max consecutive run allocation
  podSets:
  - count: 1  # Requested total instances (e.g., 1x A3 H100 8-GPU node)
    podTemplateRef:
      name: a3-h100-verification-pod-template

---
apiVersion: v1
kind: PodTemplate
metadata:
  name: a3-h100-verification-pod-template
  namespace: default
template:
  metadata:
    labels:
      app: gpu-nccl-test
      dws-queued: "true"
  spec:
    restartPolicy: Never
    nodeSelector:
      node.kubernetes.io/instance-type: a3-highgpu-8g
      cloud.google.com/gke-queued: "true"
    tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"
    containers:
    - name: dws-placeholder
      image: nvcr.io/nvidia/pytorch:24.03-py3
      resources:
        limits:
          nvidia.com/gpu: "8"
          cpu: "64"
          memory: "384Gi"
        requests:
          nvidia.com/gpu: "8"
          cpu: "64"
          memory: "384Gi"
