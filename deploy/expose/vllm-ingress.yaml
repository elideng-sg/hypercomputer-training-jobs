apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vllm-ingress
  namespace: inference
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "vllm-lb-ip"
    networking.gke.io/managed-certificates: "vllm-cert"
    networking.gke.io/v1beta1.FrontendConfig: "vllm-frontendconfig"
spec:
  defaultBackend:
    service:
      name: qwen3-vllm
      port:
        number: 8000
