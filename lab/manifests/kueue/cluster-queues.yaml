apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: cq-l4
spec:
  cohort: gpu
  admissionChecks: ["dws-flex"]
  resourceGroups:
  - coveredResources: ["nvidia.com/gpu", "cpu", "memory"]
    flavors:
    - name: l4
      resources:
      # NOTE: nominalQuota values below are placeholders; tune from Task 4 pool sizes before production
      - name: nvidia.com/gpu
        nominalQuota: "16"
      - name: cpu
        nominalQuota: "400"
      - name: memory
        nominalQuota: 3000Gi
---
