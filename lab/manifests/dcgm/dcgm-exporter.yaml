apiVersion: v1
kind: Namespace
metadata:
  name: dcgm
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dcgm-exporter
  namespace: dcgm
  labels:
    app: dcgm-exporter
spec:
  selector:
    matchLabels:
      app: dcgm-exporter
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: dcgm-exporter
    spec:
      # Target GPU nodes using affinity (all GPU pools have lab.gpu/type label)
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: lab.gpu/type
                operator: Exists
      tolerations:
      # Tolerate GPU taints (standard GKE GPU taint)
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      # Tolerate DWS/queued provisioning taints
      - key: cloud.google.com/gke-provisioning
        operator: Exists
        effect: NoSchedule
      # Tolerate custom GPU pool taints if any
      - key: lab.gpu/type
        operator: Exists
        effect: NoSchedule
      hostNetwork: true
      hostPID: true
      containers:
      - name: dcgm-exporter
        image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.8-3.6.0-ubuntu22.04
        securityContext:
          privileged: true
          capabilities:
            add:
            - SYS_ADMIN
        env:
        - name: DCGM_EXPORTER_LISTEN
          value: ":9400"
        - name: DCGM_EXPORTER_KUBERNETES
          value: "true"
        ports:
        - name: metrics
          containerPort: 9400
          hostPort: 9400
        volumeMounts:
        - name: dev
          mountPath: /dev
          readOnly: true
        - name: nvidia
          mountPath: /var/lib/nvidia
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 9400
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 9400
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: dev
        hostPath:
          path: /dev
      - name: nvidia
        hostPath:
          path: /var/lib/nvidia
---
apiVersion: v1
kind: Service
metadata:
  name: dcgm-exporter
  namespace: dcgm
  labels:
    app: dcgm-exporter
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: metrics
    port: 9400
    targetPort: 9400
  selector:
    app: dcgm-exporter
