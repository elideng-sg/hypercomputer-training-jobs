blueprint_name: hpc-lab-sp0
vars:
  project_id: $(vars.project_id)
  region:     $(vars.region)
  deployment_name: hpc-lab
  # Name of the Compute Engine reservation the durable h100-reserved pool consumes.
  # Create it first (see lab/RESERVATIONS.md); only used when h100-reserved is enabled.
  reserved_reservation_name: a3-h100-res
deployment_groups:
- group: primary
  modules:
  # NOTE: Module source paths and field names must be verified against the pinned
  # Cluster Toolkit version (gcluster --version) at deploy time. Adjust if needed.
  - id: system-net
    source: modules/network/vpc
  # 8 GPU networks for TCPX/TCPXO fabrics (a3-high uses first 4, a3-mega uses all 8).
  # Only created when corresponding GPU pools are enabled. Exact module source and
  # settings must be verified against the pinned Cluster Toolkit version at deploy time.
  - id: gpu-nets
    source: modules/network/multivpc
    settings:
      network_name_prefix: gpu-net
      global_ip_address_range: 192.168.0.0/16
      network_count: 8
      subnetwork_cidr_suffix: 24
  # RDMA network for a3-ultra / a4 pools (mrdma profile). Only created when
  # corresponding RDMA-capable pools are enabled. Exact module source and settings
  # must be verified against the pinned Cluster Toolkit version at deploy time.
  - id: rdma-net
    source: modules/network/rdma-vpc
    settings:
      network_profile: mrdma
  - id: gke-cluster
    source: modules/scheduler/gke-cluster
    use: [system-net]
    settings:
      enable_private_endpoint: false
      release_channel: REGULAR
      # workload identity on by default in this module
  - id: system-pool
    source: modules/compute/gke-node-pool
    use: [gke-cluster]
    settings:
      name: system
      machine_type: e2-standard-8
      autoscaling_total_min_nodes: 2
      autoscaling_total_max_nodes: 3
