  - id: pool-a100
    source: modules/compute/gke-node-pool
    use: [gke-cluster]
    settings:
      name: a100
      machine_type: a2-ultragpu-8g
      autoscaling_total_min_nodes: 0
      autoscaling_total_max_nodes: 2
      initial_node_count: 0
      enable_queued_provisioning: true
      reservation_affinity: { consume_reservation_type: NO_RESERVATION }
      guest_accelerator:
      - { type: nvidia-a100-80gb, count: 8, gpu_driver_version: DEFAULT }
      labels: { "lab.gpu/type": "a100", "lab.gpu/interconnect": "nvswitch" }
