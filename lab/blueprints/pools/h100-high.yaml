  - id: pool-h100-high
    source: modules/compute/gke-node-pool
    use: [gke-cluster, gpu-nets]
    settings:
      name: h100-high
      machine_type: a3-highgpu-8g
      autoscaling_total_min_nodes: 0
      autoscaling_total_max_nodes: 2
      initial_node_count: 0
      enable_queued_provisioning: true
      reservation_affinity: { consume_reservation_type: NO_RESERVATION }
      guest_accelerator:
      - { type: nvidia-h100-80gb, count: 8, gpu_driver_version: DEFAULT }
      labels: { "lab.gpu/type": "h100-high", "lab.gpu/interconnect": "tcpx" }
      # NOTE: a3-highgpu requires only the FIRST 4 of the 8 GPU networks.
      # Deploy-time: verify syntax for attaching first 4 networks from gpu-nets module.
      additional_networks: $(gpu-nets.additional_networks)
      # NOTE: maxRunDuration (if supported) should be set to var.max_run_duration_seconds at deploy;
      # verify field name against Cluster Toolkit version. Current enforcement is via Job activeDeadlineSeconds.
